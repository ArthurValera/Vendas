<!DOCTYPE html>
<html
        xmlns:th="https://thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="utf-8">
    <title>Lista</title>
</head>

<body>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Sigla</th>
        <th>Ação</th>
    </tr>
    </thead>
    <tbody th:each="estado: ${listaEstado}">
    <tr>
        <td th:text="${estado.id}"></td>
        <td th:text="${estado.nome}"></td>
        <td th:text="${estado.sigla}"></td>
        <td>
            <a th:href="@{/editaEstado/{id}(id=${estado.id})}">Editar</a>
            <a th:href="@{/removeEstado/{id}(id=${estado.id})}">Excluir</a>
        </td>
    </tr>
    </tbody>
</table>

</body>

</html>
